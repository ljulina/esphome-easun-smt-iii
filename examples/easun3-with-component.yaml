  output_source_priority_setting:
    name: "Output Source Priority Setting"
  # Writable number entity (MNCHGC<NNN>). Also reads the state from HEEP1 field 1.
  # Component defaults: 10..120 A, step 10, unit "A", icon mdi:current-dc.
  # Everything can be overridden in YAML (min_value / max_value / step / unit_of_measurement / icon).
  max_charging_current:
    name: "Max Charging Current"
  # Writable number entity (BMSSRC<NNN>). Also reads the state from HEEP1 field 13.
  # Component defaults: 5..100 %, step 5, unit "%", icon mdi:battery-heart.
  inverter_startup_battery_capacity:
    name: "Inverter Startup Battery Capacity"
  maximum_mains_charging_current_settings:
    name: "Maximum Mains Charging Current Setting"

