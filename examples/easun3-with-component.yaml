substitutions:
  name: easun3
  device_description: "Monitoring and control of the EASUN SMT-III inverter over RS232 (external component)"
  tx_pin: GPIO1
  rx_pin: GPIO3

# RJ45 on Solar Plug-RWB1 ver. -06R (inverter RS232 TX/RX labels)
# ⚠️ WARNING: Solar Plug-RWB1 ver. -06R only ⚠️
# P2 - 12V
# P3 - TX  -> MAX3232 RX -> ESP32 GPIO3 (RX)
# P5 - GND
# P6 - RX  <- MAX3232 TX <- ESP32 GPIO1 (TX)
#

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: ljulina.esphome-easun-smt-iii
    version: "0.1.1"

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

logger:
  baud_rate: 0
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome
  password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

web_server:
  port: 80

captive_portal:

external_components:
  - source:
      type: local
      path: components

uart:
  - id: uart_0
    baud_rate: 2400
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}

# Required if you want to use sync_inverter_datetime (the current time is taken
# from here and sent to the inverter). Without the time: component the button
# only logs a warning and sends nothing. Set the time zone as needed.
time:
  - platform: sntp
    id: ha_time
    timezone: Europe/Prague

easun_smt_iii:
  id: easun
  uart_id: uart_0
  time_id: ha_time

  # "Sync Inverter Datetime From HA" button - when pressed it sends the current
  # time from the time: component to the inverter via the ^S???DAT<YYMMDDhhmmss>
  # command. In HA you can create an automation that presses it e.g. daily at 03:00.
  sync_inverter_datetime:
    name: "Sync Inverter Datetime From HA"
  clear_fault_information:
    name: "Clear Fault Information"
  reset_factory_setting:
    name: "Reset Factory Setting"
  clear_power_generation:
    name: "Clear Power Generation"
  dropped_response_count:
    name: "Dropped Response Count"
  dropped_response_last:
    name: "Dropped Response Last"
  # Each query has its own interval, but only 1 command runs on the UART at a
  # time: query -> response/timeout -> throttle -> next query.
  poll_interval: 10s
  response_timeout: 3s

  output_voltage:
    name: "Output Voltage"
  output_frequency:
    name: "Output Frequency"
  output_apparent_power:
    name: "Output Apparent Power"
  output_active_power:
    name: "Output Active Power"
  load_percentage:
    name: "Load Percentage"
  bus_voltage:
    name: "Bus Voltage"
  rated_power:
    name: "Rated Power"
  inductor_current:
    name: "Inductor Current"
  status:
    name: "Status"

  # All queries run through a single queue: query -> response/timeout -> throttle -> next query.
  # The HOP/HGRID/HBAT/... commands are already built into the component; you don't need to
  # list them in YAML unless you want to change them. Typically only intervals and timeout/throttle are tuned here.
  # hgrid_poll_interval: 60s
  hgrid_tx_delay: 200ms
  # hbat_poll_interval: 10s
  # hsts_poll_interval: 60s
  # hpv_poll_interval: 10s
  # htemp_poll_interval: 10s
  # heep1_poll_interval: 60s
