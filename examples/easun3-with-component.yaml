    name: "AC Voltage"
  ac_frequency:
    name: "AC Frequency"
  high_point_of_mains:
    name: "High Point Of Mains"
  low_point_of_mains:
    name: "Low Point Of Mains"
  high_frequency_of_mains:
    name: "High Frequency Of Mains"
  low_frequency_of_mains:
    name: "Low Frequency Of Mains"
#  hgrid_6:                              # could not be identified
